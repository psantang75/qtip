version: '3.8'

services:
  # MySQL Database
  database:
    image: mysql:8.0
    container_name: qtip-database
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-Thrills0011**}
      MYSQL_DATABASE: ${DB_NAME:-qtip}
      MYSQL_USER: ${DB_USER:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-Thrills0011**}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/qtip_database_schema_6.13.2025.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - qtip-network
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-Thrills0011**}"]
      timeout: 20s
      retries: 10
      interval: 30s

  # QTIP Application
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: qtip-app
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DB_HOST: database
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-qtip}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-Thrills0011**}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-your-refresh-token-secret-change-in-production}
      PORT: 3000
      FRONTEND_PORT: 5173
    ports:
      - "3000:3000"
      - "5173:5173"
    volumes:
      - app_logs:/app/logs
      - app_backups:/app/backups
    networks:
      - qtip-network
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/monitoring/health"]
      timeout: 10s
      retries: 5
      interval: 30s

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: qtip-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.config.template:/etc/nginx/conf.d/default.conf:ro
      - nginx_logs:/var/log/nginx
    networks:
      - qtip-network
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      timeout: 10s
      retries: 3
      interval: 30s

  # Redis for Session Management (Optional)
  redis:
    image: redis:7-alpine
    container_name: qtip-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - qtip-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-your-redis-password}

networks:
  qtip-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  app_logs:
    driver: local
  app_backups:
    driver: local
  nginx_logs:
    driver: local
  redis_data:
    driver: local 